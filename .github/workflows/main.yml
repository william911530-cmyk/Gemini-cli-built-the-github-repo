name: 自動更新全大盤分片特徵資料庫

on:
  schedule:
    # 每天台灣時間凌晨 5 點 (國際標準時間 21:00) 自動跑一次
    - cron: '0 21 * * *' 
  workflow_dispatch: # 允許你在 GitHub 網頁上手動點擊執行

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v3
        
      - name: 安裝 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests beautifulsoup4
          
      - name: 執行全大盤特徵提取腳本
        # 🌟 注意：如果你的 Python 檔名是 stock_analyzer.py，請把下面這行改成 python stock_analyzer.py
        run: python update_all_market.py 
        
      - name: 將最新分片資料庫推送回 GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add database/ || true
          git commit -m "🤖 自動更新全大盤分片特徵資料庫" || echo "No changes to commit"
          git push
